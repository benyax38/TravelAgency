events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    upstream frontend_servers {
        server frontend1:80;
        server frontend2:80;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://frontend_servers;
            # Esta línea es clave para Single Page Applications (React)
            try_files $uri $uri/ /index.html; 
        }
    }
}