services:
  # =========================
  # DATABASE
  # =========================
  db:
    image: postgres:15
    container_name: travel_agency_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - backend-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql

  # =========================
  # KEYCLOAK
  # =========================
  keycloak:
    image: quay.io/keycloak/keycloak:21.1.1
    container_name: keycloak_auth
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ./keycloak/providers:/opt/keycloak/providers
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_started
    networks:
      - backend-network
      - frontend-network

  # =========================
  # BACKEND
  # =========================
  backend1: &backend_base
    build: ./backend
    environment:
      RUN_INIT_DATA: "true"
      DB_HOST: "db"
      KEYCLOAK_ISSUER_URI: "http://keycloak:8080/realms/${KEYCLOAK_REALM}"
      # Usamos localhost para que coincida con el issuer que recibe el navegador
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "http://localhost:8080/realms/${KEYCLOAK_REALM}"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs"
      KEYCLOAK_SERVER_URL: "${KEYCLOAK_SERVER_URL}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID}"
      KEYCLOAK_ADMIN_USERNAME: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
    depends_on:
      db:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - backend-network

  backend2:
    <<: *backend_base
    environment:
      RUN_INIT_DATA: "false"
      DB_HOST: "db"
      KEYCLOAK_ISSUER_URI: "http://keycloak:8080/realms/${KEYCLOAK_REALM}"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "http://localhost:8080/realms/${KEYCLOAK_REALM}"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs"
      KEYCLOAK_SERVER_URL: "${KEYCLOAK_SERVER_URL}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID}"
      KEYCLOAK_ADMIN_USERNAME: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
    depends_on:
      backend1:
        condition: service_started

  # =========================
  # FRONTEND
  # =========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./.env:/app/.env
    environment:
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_NODE_ENV: ${VITE_NODE_ENV}
    networks:
      - frontend-network
      - backend-network

  # =========================
  # NGINX
  # =========================
  nginx-backend:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
    networks:
      - backend-network
      - frontend-network

volumes:
  postgres_data:

networks:
  frontend-network:
  backend-network: